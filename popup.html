<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runway Auto Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px;
      border-bottom: 1px solid #2a2a3e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .header p {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    .status-bar {
      padding: 10px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e88;
      animation: pulse 1.5s infinite;
    }

    .status-dot.inactive { background: #555; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .content { padding: 16px; }

    .section {
      margin-bottom: 16px;
    }

    .section label {
      display: block;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .info-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .info-card .value {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .info-card .label {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }

    .info-card.found .value { color: #22c55e; }
    .info-card.enabled .value { color: #f59e0b; }

    .interval-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .interval-row span {
      font-size: 12px;
      color: #aaa;
      flex: 1;
    }

    .interval-row input[type="number"] {
      width: 64px;
      padding: 4px 8px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      color: #fff;
      font-size: 13px;
      text-align: center;
    }

    .interval-row input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .interval-row select {
      padding: 4px 6px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }

    .interval-row select:focus {
      outline: none;
      border-color: #667eea;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 8px;
    }

    .toggle-row span {
      font-size: 12px;
      color: #aaa;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #666;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle input:checked + .toggle-slider { background: #667eea33; }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background: #667eea;
    }

    .main-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .btn-start {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .btn-start:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-stop {
      background: #2a2a2a;
      color: #f87171;
      border: 1px solid #3a3a3a;
    }

    .btn-stop:hover { background: #3a1a1a; border-color: #f87171; }

    .log-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      color: #666;
      min-height: 60px;
      max-height: 80px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
    }

    .log-box .log-entry { margin-bottom: 3px; }
    .log-box .log-entry.success { color: #22c55e; }
    .log-box .log-entry.info { color: #60a5fa; }
    .log-box .log-entry.warn { color: #f59e0b; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #2a2a2a;
      font-size: 10px;
      color: #444;
      text-align: center;
    }

    #pageStatus {
      font-size: 12px;
      color: #aaa;
      flex: 1;
    }

    #pageStatus.on-runway { color: #22c55e; }
    #pageStatus.off-runway { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎬</div>
    <div>
      <h1>Runway Auto Generator</h1>
      <p>Generate 버튼 자동 클릭</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot inactive" id="statusDot"></div>
    <span id="pageStatus" class="off-runway">Runway 페이지를 열어주세요</span>
  </div>

  <div class="content">
    <!-- 버튼 상태 정보 -->
    <div class="section">
      <label>현재 상태</label>
      <div class="info-grid">
        <div class="info-card" id="cardFound">
          <div class="value" id="valFound">-</div>
          <div class="label">버튼 감지</div>
        </div>
        <div class="info-card" id="cardEnabled">
          <div class="value" id="valEnabled">-</div>
          <div class="label">버튼 활성화</div>
        </div>
      </div>
    </div>

    <!-- 설정 -->
    <div class="section">
      <label>설정</label>
      <div class="interval-row">
        <span>⏱ 체크 간격</span>
        <input type="number" id="intervalInput" value="3" min="1" max="99">
        <select id="unitSelect">
          <option value="sec">초</option>
          <option value="min">분</option>
        </select>
      </div>
      <div class="toggle-row">
        <span>🚀 페이지 로드 시 자동 시작</span>
        <label class="toggle">
          <input type="checkbox" id="autoStartToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- 제어 버튼 -->
    <button class="main-btn btn-start" id="startBtn">▶ 모니터링 시작</button>
    <button class="main-btn btn-stop" id="stopBtn" style="display:none">⏹ 모니터링 중지</button>

    <!-- 로그 -->
    <div class="section">
      <label>로그</label>
      <div class="log-box" id="logBox">
        <div class="log-entry info">확장 프로그램 준비됨</div>
      </div>
    </div>
  </div>

  <div class="footer">
    마지막 클릭: <span id="lastClick">없음</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
